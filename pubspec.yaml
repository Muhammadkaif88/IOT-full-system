name: smartnest
description: "SmartNest - IoT Home Automation App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  mqtt_client: ^10.2.1
  provider: ^6.1.1
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  fl_chart: ^0.66.2
  flutter_colorpicker: ^1.0.3
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true